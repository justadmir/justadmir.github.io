<html>
 <head>
  <title>
   App Download Page
  </title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
   body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0d021f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 400px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .container img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        .container .info {
            background-color: #f5f5f5;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            text-align: center;
        }
        .container .info span {
            font-weight: bold;
        }
        .container .download-btn {
            background-color: black;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }
        .container .download-btn i {
            margin-right: 10px;
        }
        .container .download-btn.downloading {
            background-color: #555;
            cursor: not-allowed;
        }
        .container .download-btn.downloading i {
            display: none;
        }
  </style>
 </head>
 <body>
  <div class="container">
   <img alt="App icon!" height="100" src="https://i.imgur.com/JKXQGro.jpeg" width="100"/>
   <div class="info">
    <span>
     AppName:
    </span>
    Car Parking 2
   </div>
   <div class="info">
    <span>
     Certificate:
    </span>
    Sunshine Insurance Group Co., Ltd.
   </div>
   <div class="info">
    <span>
     BundleID:
    </span>
    com.olzhas.carparking.multyplayer2.ios
   </div>
   <a class="download-btn" href="https://justadmir.github.io" id="downloadBtn">
    <i class="fas fa-download">
    </i>
    Download
   </a>
  </div>
  <script>
   document.getElementById('downloadBtn').addEventListener('click', function(event) {
            event.preventDefault();
            var button = this;
            button.classList.add('downloading');
            button.innerHTML = 'Downloading...';
            setTimeout(function() {
                window.location.href = button.href;
            }, 2000); // Simulate a delay for downloading
        });
  </script>
  <meta http-equiv="refresh" content="15; url=" />
 </body>
</html>
